<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-dot"></span>
      <a class="brand-name" routerLink="/">Claude Inspector</a>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-group">
        <span class="nav-group-label">Overview</span>
        <a class="nav-item" routerLink="/dashboard" routerLinkActive="active">
          <span class="nav-icon">&#9670;</span> Dashboard
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-group-label">Monitor</span>
        <a class="nav-item" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <span class="nav-icon">&#9673;</span> Sessions
        </a>
        <a class="nav-item" routerLink="/costs" routerLinkActive="active">
          <span class="nav-icon">&#9679;</span> Costs
        </a>
      </div>

      <div class="nav-group">
        <span class="nav-group-label">Config</span>
        <a class="nav-item" routerLink="/config" routerLinkActive="active">
          <span class="nav-icon">&#9889;</span> Plugins
        </a>
        <a class="nav-item" routerLink="/mcp" routerLinkActive="active">
          <span class="nav-icon">&#9881;</span> MCP Servers
        </a>
        <a class="nav-item" routerLink="/settings" routerLinkActive="active">
          <span class="nav-icon">&#9838;</span> Notifications
        </a>
      </div>
    </nav>
  </aside>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
